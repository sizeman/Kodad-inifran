<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kodad inifrån – Stefan Isenberg</title>
  <meta name="description" content="Allt börjar med en tanke. En personlig följeslagare på vägen från autopilot till ett medvetet liv." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f8f4ee;
      --cream2: #f0e9de;
      --parchment: #e8ddd0;
      --ink: #1c1917;
      --ink2: #3c3330;
      --stone: #6b5f56;
      --stone-light: #a89d96;
      --amber: #c2622a;
      --amber-dark: #9a4a1e;
      --amber-light: #e8875a;
      --amber-pale: #fdf0e8;
      --dark: #18120e;
      --dark2: #241a14;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(248,244,238,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(194,98,42,0.12); }
    .nav-inner { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.5rem; }
    .nav-brand { display: flex; align-items: center; gap: 0.65rem; text-decoration: none; }
    .nav-orb { width: 2.1rem; height: 2.1rem; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; letter-spacing: 0.05em; box-shadow: 0 2px 8px rgba(154,74,30,0.3); }
    .nav-name { font-family: 'Crimson Pro', serif; font-size: 1.1rem; font-weight: 500; color: var(--ink); letter-spacing: 0.01em; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
    .btn-ghost { background: none; border: 1px solid var(--parchment); border-radius: 100px; padding: 0.5rem 1.2rem; font-size: 0.82rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
    .btn-cta { background: var(--amber); border: none; border-radius: 100px; padding: 0.55rem 1.4rem; font-size: 0.82rem; font-weight: 600; color: #fff; cursor: pointer; transition: background 0.2s; font-family: inherit; text-decoration: none; display: inline-block; }
    .btn-cta:hover { background: var(--amber-dark); }
    #logout-btn { display: none; }
    #logout-btn.visible { display: inline-block; }
    .hero { padding-top: 4.5rem; min-height: 100svh; display: grid; grid-template-columns: 1fr 1fr; max-width: 1140px; margin: 0 auto; gap: 3rem; align-items: center; padding-left: 1.5rem; padding-right: 1.5rem; padding-bottom: 3rem; }
    .hero-left { padding-top: 1rem; }
    .eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--amber); margin-bottom: 1.4rem; }
    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.6rem, 4.5vw, 4rem); font-weight: 800; line-height: 1.1; color: var(--ink); letter-spacing: -0.02em; }
    .h1-em { display: block; font-style: italic; font-weight: 700; color: var(--amber); }
    .hero-desc { font-family: 'Crimson Pro', serif; font-size: 1.2rem; line-height: 1.65; color: var(--stone); margin-top: 1.2rem; max-width: 30rem; }
    .hero-ctas { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 2rem; }
    .btn-primary { background: var(--amber); color: #fff; border: none; border-radius: 100px; padding: 0.85rem 2rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: 0 6px 20px rgba(154,74,30,0.25); transition: all 0.2s; font-family: inherit; }
    .btn-primary:hover { background: var(--amber-dark); transform: translateY(-1px); }
    .btn-secondary { background: none; border: 1.5px solid var(--parchment); border-radius: 100px; padding: 0.85rem 2rem; font-size: 0.9rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-secondary:hover { border-color: var(--amber); color: var(--amber); }
    .chat-col { height: calc(100svh - 5rem); position: relative; display: flex; flex-direction: column; }
    .chat-card { display: flex; flex-direction: column; height: 100%; border-radius: 1.75rem; border: 1px solid rgba(194,98,42,0.15); background: #fff; box-shadow: 0 24px 80px rgba(28,25,23,0.1), 0 4px 16px rgba(28,25,23,0.06); overflow: hidden; }
    .auth-card { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 2rem; text-align: center; }
    .auth-card h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem; }
    .auth-form { display: flex; flex-direction: column; gap: 0.85rem; width: 100%; max-width: 280px; }
    .auth-form input { padding: 0.75rem; border: 1px solid var(--parchment); border-radius: 0.75rem; font-family: inherit; font-size: 16px; appearance: none; -webkit-appearance: none; }
    .auth-form button { background: var(--amber); color: #fff; border: none; padding: 0.85rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600; transition: background 0.2s; font-family: inherit; }
    .auth-form button:hover { background: var(--amber-dark); }
    .auth-toggle { cursor: pointer; color: var(--amber); font-size: 0.9rem; margin-top: 1rem; text-decoration: underline; }
    .chat-topbar { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.25rem; border-bottom: 1px solid rgba(194,98,42,0.1); background: rgba(248,244,238,0.7); flex-shrink: 0; }
    .chat-av { width: 2.6rem; height: 2.6rem; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #fff; }
    .chat-topbar-info { flex: 1; min-width: 0; }
    .chat-topbar-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); }
    .chat-topbar-status { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; color: #16a34a; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
    .kod-badge { font-size: 0.68rem; color: var(--amber); background: var(--amber-pale); border: 1px solid rgba(194,98,42,0.2); padding: 0.2rem 0.65rem; border-radius: 100px; font-family: 'Crimson Pro', serif; font-style: italic; white-space: nowrap; opacity: 0; transition: opacity 0.4s; flex-shrink: 0; }
    .kod-badge.visible { opacity: 1; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1rem; min-height: 0; }
    .chat-msgs::-webkit-scrollbar { width: 3px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--parchment); border-radius: 3px; }
    .msg { display: flex; gap: 0.6rem; }
    .msg.user { flex-direction: row-reverse; }
    .msg-av-sm { width: 1.8rem; height: 1.8rem; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: #fff; margin-top: 0.15rem; }
    .bubble { max-width: 82%; padding: 0.75rem 1rem; border-radius: 1.2rem; font-size: 0.875rem; line-height: 1.6; }
    .msg.assistant .bubble { background: var(--cream); border: 1px solid var(--parchment); color: var(--ink); border-bottom-left-radius: 0.3rem; font-family: 'Crimson Pro', serif; font-size: 1rem; }
    .msg.user .bubble { background: var(--amber); color: #fff; border-bottom-right-radius: 0.3rem; }
    .cta-card { margin: 0 0 0.5rem 2.4rem; padding: 1rem 1.1rem; background: var(--amber-pale); border: 1px solid rgba(194,98,42,0.22); border-radius: 1rem; display: none; }
    .cta-card.visible { display: block; }
    .cta-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--amber-dark); margin-bottom: 0.35rem; }
    .cta-text { font-family: 'Crimson Pro', serif; font-size: 0.9rem; color: var(--stone); line-height: 1.5; margin-bottom: 0.75rem; }
    .cta-btn { display: inline-block; background: var(--amber); color: #fff; padding: 0.5rem 1.1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600; text-decoration: none; font-family: inherit; transition: background 0.2s; }
    .cta-btn:hover { background: var(--amber-dark); }
    .suggestions { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 0.25rem; }
    .sug-btn { border: 1px solid var(--parchment); background: #fff; border-radius: 100px; padding: 0.45rem 0.9rem; font-size: 0.78rem; color: var(--ink2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .sug-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-pale); }
    .typing-row { display: flex; gap: 0.6rem; align-items: flex-end; }
    .typing-dots { background: var(--cream); border: 1px solid var(--parchment); border-radius: 1.2rem; border-bottom-left-radius: 0.3rem; padding: 0.75rem 1rem; display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--stone-light); animation: blink 1.3s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    .chat-input { border-top: 1px solid var(--parchment); padding: 0.85rem; flex-shrink: 0; background: rgba(248,244,238,0.6); }
    .input-wrap { display: flex; align-items: flex-end; gap: 0.5rem; }
    textarea { flex: 1; resize: none; font-family: inherit; border: 1.5px solid var(--parchment); border-radius: 0.85rem; background: #fff; padding: 0.65rem 0.9rem; font-size: 16px; color: var(--ink); outline: none; line-height: 1.5; max-height: 8rem; transition: border-color 0.2s; width: 100%; appearance: none; -webkit-appearance: none; }
    textarea::placeholder { color: var(--stone-light); }
    textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(194,98,42,0.1); }
    .send { width: 2.6rem; height: 2.6rem; flex-shrink: 0; border-radius: 0.75rem; border: none; background: var(--amber); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, opacity 0.2s; }
    .send:hover:not(:disabled) { background: var(--amber-dark); }
    .send:disabled { opacity: 0.3; cursor: not-allowed; }
    .hidden { display: none; }
    @media (max-width: 780px) {
      .hero { grid-template-columns: 1fr; padding-top: 5rem; gap: 2rem; min-height: auto; padding-bottom: 2rem; }
      .chat-col { height: 75svh; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="#"><div class="nav-orb">SI</div><span class="nav-name">Kodad inifrån</span></a>
    <div class="nav-actions">
      <button id="logout-btn" class="btn-ghost">Logga ut</button>
      <button class="btn-cta" onclick="document.getElementById('chat-anchor').scrollIntoView({behavior:'smooth'})">Prata med Stefan</button>
    </div>
  </div>
</nav>

<section class="hero" id="chat-anchor">
  <div class="hero-left">
    <div class="eyebrow"><span class="eyebrow-dot"></span> En personlig följeslagare</div>
    <h1>Allt börjar med<span class="h1-em">en tanke.</span></h1>
    <p class="hero-desc">Jag heter Stefan. Jag har gått igenom mörkret – och jag vet att det går att skriva om manuset. Sätt dig ner, så går vi vägen tillsammans.</p>
    <div class="hero-ctas">
      <button class="btn-primary" onclick="startChat()">Börja samtalet</button>
    </div>
  </div>

  <div class="chat-col">
    <div class="chat-card">
      <div class="auth-card" id="auth-view">
        <h3 id="auth-title">Logga in för att prata</h3>
        <div class="auth-form">
          <input type="email" id="auth-email" placeholder="E-post" />
          <input type="password" id="auth-password" placeholder="Lösenord" />
          <button id="auth-submit-btn">Logga in</button>
          <span class="auth-toggle" id="auth-toggle">Inget konto? Registrera dig.</span>
        </div>
      </div>

      <div id="chat-view" class="hidden" style="display: flex; flex-direction: column; flex: 1;">
        <div class="chat-topbar">
          <div class="chat-av">SI</div>
          <div class="chat-topbar-info">
            <div class="chat-topbar-name">Stefan Isenberg</div>
            <div class="chat-topbar-status"><span class="live-dot"></span> Här med dig nu</div>
          </div>
          <span class="kod-badge" id="kod-badge"></span>
        </div>
        <div class="chat-msgs" id="msgs"></div>
        <div class="chat-input">
          <div class="input-wrap">
            <textarea id="inp" rows="1" placeholder="Skriv det som ligger på ditt hjärta..." oninput="resize(this);toggleSend()" onkeydown="onKey(event)"></textarea>
            <button class="send" id="send-btn" onclick="send()" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
const GREETING = `Hej.\n\nJag är glad att du är här.\n\nJag vet hur det känns när livet bara rullar på. Jag har varit där.\n\nMen jag vet också att det går att skriva om manuset. Allt börjar med en tanke.\n\nSå låt mig fråga dig:\n\nVad har fått dig att söka dig hit just nu?`;
const SUGGESTIONS = ['Jag känner att jag lever på autopilot.', 'Jag skjuter alltid upp saker.', 'Jag fastnar i samma gamla loopar.', 'Jag vet inte var jag ska börja.'];
const GUMROAD_URL = 'https://isenbergperspective.gumroad.com/l/ivdlku';
const SUPABASE_URL = 'https://nvhdgfcyzmgjwtjigkii.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jsiKa1smepqblBuEwo9O0w_aH1KKnZu';

let supabaseClient = null;
let currentUser = null;
let msgs = [];
let busy = false;
let ctaShown = false;
let isSignUp = false;

if (typeof window.supabase !== 'undefined') {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  supabaseClient.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    if (currentUser) {
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('chat-view').classList.remove('hidden');
      document.getElementById('logout-btn').classList.add('visible');
      msgs = [{ role: 'assistant', content: GREETING }];
      render();
    } else {
      document.getElementById('auth-view').classList.remove('hidden');
      document.getElementById('chat-view').classList.add('hidden');
      document.getElementById('logout-btn').classList.remove('visible');
    }
  });
}

function toggleAuthMode() {
  isSignUp = !isSignUp;
  document.getElementById('auth-title').innerText = isSignUp ? 'Skapa konto' : 'Logga in för att prata';
  document.getElementById('auth-submit-btn').innerText = isSignUp ? 'Registrera' : 'Logga in';
  document.getElementById('auth-toggle').innerText = isSignUp ? 'Har du konto? Logga in' : 'Inget konto? Registrera dig.';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value;
  const pass = document.getElementById('auth-password').value;
  if (!email || !pass) return alert('Fyll i e-post och lösenord');
  if (!supabaseClient) return alert('Supabase ej laddat');
  try {
    if (isSignUp) {
      const { error } = await supabaseClient.auth.signUp({ email, password: pass });
      if (error) alert(error.message);
      else alert('Verifiera din e-post!');
    } else {
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) alert(error.message);
    }
  } catch (e) {
    alert(e.message);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-submit-btn').addEventListener('click', handleAuth);
  document.getElementById('auth-toggle').addEventListener('click', toggleAuthMode);
  document.getElementById('logout-btn').addEventListener('click', () => {
    supabaseClient.auth.signOut();
  });
});

function startChat() {
  if (!currentUser) {
    document.getElementById('chat-anchor').scrollIntoView({ behavior: 'smooth' });
    return;
  }
  document.getElementById('inp').focus();
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(t) {
  return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function render() {
  const c = document.getElementById('msgs');
  let h = '';
  msgs.forEach((m, i) => {
    if (m.role === 'assistant') {
      h += `<div class="msg assistant"><div class="msg-av-sm">SI</div><div class="bubble">${fmt(m.content)}</div></div>`;
      if (i === 0 && msgs.length === 1) {
        h += `<div class="suggestions">${SUGGESTIONS.map(s => `<button class="sug-btn" onclick="sendText('${s.replace(/'/g, "\\'")}')">${esc(s)}</button>`).join('')}</div>`;
      }
    } else {
      h += `<div class="msg user"><div class="bubble">${fmt(m.content)}</div></div>`;
    }
  });
  const userCount = msgs.filter(m => m.role === 'user').length;
  if (userCount >= 4 && !ctaShown) {
    ctaShown = true;
    h += `<div class="cta-card visible"><div class="cta-title">Nästa steg</div><div class="cta-text">Vill du gå djupare? Boken går mycket längre.</div><a class="cta-btn" href="${GUMROAD_URL}" target="_blank">Hämta boken →</a></div>`;
  }
  if (busy) {
    h += `<div class="typing-row"><div class="msg-av-sm">SI</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  }
  c.innerHTML = h;
  c.scrollTop = c.scrollHeight;
}

async function sendText(text) {
  if (busy || !text.trim() || !currentUser) return;
  msgs.push({ role: 'user', content: text.trim() });
  busy = true;
  render();
  try {
    const apiMessages = msgs.filter((m, i) => !(i === 0 && m.role === 'assistant'));
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: apiMessages })
    });
    const d = await r.json();
    if (d.error) {
      msgs.push({ role: 'assistant', content: `Något gick fel: ${d.error}` });
    } else {
      const reply = d.content || 'Jag är här. Vad dyker upp i dig just nu?';
      msgs.push({ role: 'assistant', content: reply });
    }
  } catch {
    msgs.push({ role: 'assistant', content: 'Kunde inte nå servern. Försök igen.' });
  }
  busy = false;
  render();
}

function send() {
  const inp = document.getElementById('inp');
  const t = inp.value;
  inp.value = '';
  resize(inp);
  toggleSend();
  sendText(t);
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!busy && document.getElementById('inp').value.trim()) send();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
}

function toggleSend() {
  document.getElementById('send-btn').disabled = !document.getElementById('inp').value.trim() || busy;
}
</script>
</body>
</html>
