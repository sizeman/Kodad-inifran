<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kodad inifrån – Stefan Isenberg (TEST)</title>
  <meta name="description" content="Allt börjar med en tanke. En personlig följeslagare på vägen från autopilot till ett medvetet liv." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f8f4ee;
      --parchment: #e8ddd0;
      --ink: #1c1917;
      --ink2: #3c3330;
      --stone: #6b5f56;
      --amber: #c2622a;
      --amber-dark: #9a4a1e;
      --amber-pale: #fdf0e8;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(248,244,238,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(194,98,42,0.12); }
    .nav-inner { max-width: 1140px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.5rem; }
    .nav-brand { display: flex; align-items: center; gap: 0.65rem; text-decoration: none; }
    .nav-orb { width: 2.1rem; height: 2.1rem; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
    .nav-name { font-family: 'Crimson Pro', serif; font-size: 1.1rem; font-weight: 500; color: var(--ink); }
    .nav-test { font-size: 0.65rem; color: var(--amber); font-weight: 600; margin-left: 0.5rem; }
    .hero { padding-top: 4.5rem; min-height: 100svh; display: grid; grid-template-columns: 1fr 1fr; max-width: 1140px; margin: 0 auto; gap: 3rem; align-items: center; padding-left: 1.5rem; padding-right: 1.5rem; padding-bottom: 3rem; }
    .hero-left { padding-top: 1rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.6rem, 4.5vw, 4rem); font-weight: 800; line-height: 1.1; color: var(--ink); }
    .h1-em { display: block; font-style: italic; color: var(--amber); }
    .hero-desc { font-family: 'Crimson Pro', serif; font-size: 1.2rem; line-height: 1.65; color: var(--stone); margin-top: 1.2rem; max-width: 30rem; }
    .chat-col { height: calc(100svh - 5rem); position: relative; display: flex; flex-direction: column; }
    .chat-card { display: flex; flex-direction: column; height: 100%; border-radius: 1.75rem; border: 1px solid rgba(194,98,42,0.15); background: #fff; box-shadow: 0 24px 80px rgba(28,25,23,0.1), 0 4px 16px rgba(28,25,23,0.06); overflow: hidden; }
    .chat-topbar { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.25rem; border-bottom: 1px solid rgba(194,98,42,0.1); background: rgba(248,244,238,0.7); flex-shrink: 0; }
    .chat-av { width: 2.6rem; height: 2.6rem; border-radius: 50%; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #fff; }
    .chat-topbar-info { flex: 1; }
    .chat-topbar-name { font-size: 0.88rem; font-weight: 600; color: var(--ink); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .test-badge { font-size: 0.65rem; background: var(--amber-pale); color: var(--amber); padding: 0.2rem 0.65rem; border-radius: 100px; margin-left: auto; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1rem; min-height: 0; }
    .msg { display: flex; gap: 0.6rem; }
    .msg.user { flex-direction: row-reverse; }
    .msg-av-sm { width: 1.8rem; height: 1.8rem; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--amber), var(--amber-dark)); display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: #fff; }
    .bubble { max-width: 82%; padding: 0.75rem 1rem; border-radius: 1.2rem; font-size: 0.875rem; line-height: 1.6; }
    .msg.assistant .bubble { background: var(--cream); border: 1px solid var(--parchment); color: var(--ink); border-bottom-left-radius: 0.3rem; font-family: 'Crimson Pro', serif; font-size: 1rem; }
    .msg.user .bubble { background: var(--amber); color: #fff; border-bottom-right-radius: 0.3rem; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 0.25rem; }
    .sug-btn { border: 1px solid var(--parchment); background: #fff; border-radius: 100px; padding: 0.45rem 0.9rem; font-size: 0.78rem; color: var(--ink2); cursor: pointer; transition: all 0.15s; }
    .sug-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-pale); }
    .typing-dots { background: var(--cream); border: 1px solid var(--parchment); border-radius: 1.2rem; border-bottom-left-radius: 0.3rem; padding: 0.75rem 1rem; display: flex; gap: 4px; }
    .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--stone); animation: blink 1.3s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
    .chat-input { border-top: 1px solid var(--parchment); padding: 0.85rem; flex-shrink: 0; background: rgba(248,244,238,0.6); }
    .input-wrap { display: flex; align-items: flex-end; gap: 0.5rem; }
    textarea { flex: 1; resize: none; font-family: inherit; border: 1.5px solid var(--parchment); border-radius: 0.85rem; background: #fff; padding: 0.65rem 0.9rem; font-size: 16px; color: var(--ink); outline: none; line-height: 1.5; max-height: 8rem; width: 100%; }
    textarea::placeholder { color: #a89d96; }
    textarea:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(194,98,42,0.1); }
    .send { width: 2.6rem; height: 2.6rem; flex-shrink: 0; border-radius: 0.75rem; border: none; background: var(--amber); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .send:hover:not(:disabled) { background: var(--amber-dark); }
    .send:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="#">
      <div class="nav-orb">SI</div>
      <span class="nav-name">Kodad inifrån<span class="nav-test">TEST VERSION</span></span>
    </a>
  </div>
</nav>

<section class="hero">
  <div class="hero-left">
    <h1>Allt börjar med<span class="h1-em">en tanke.</span></h1>
    <p class="hero-desc">Test-version utan auth. Prata direkt med Stefan.</p>
  </div>

  <div class="chat-col">
    <div class="chat-card">
      <div class="chat-topbar">
        <div class="chat-av">SI</div>
        <div class="chat-topbar-info">
          <div class="chat-topbar-name">Stefan Isenberg</div>
        </div>
        <span class="test-badge">TEST</span>
      </div>
      <div class="chat-msgs" id="msgs"></div>
      <div class="chat-input">
        <div class="input-wrap">
          <textarea id="inp" rows="1" placeholder="Skriv det som ligger på ditt hjärta..." oninput="resize(this);toggleSend()" onkeydown="onKey(event)"></textarea>
          <button class="send" id="send-btn" onclick="send()" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
const GREETING = `Hej.\n\nJag är glad att du är här.\n\nJag vet hur det känns när livet bara rullar på. Jag har varit där.\n\nMen jag vet också att det går att skriva om manuset. Allt börjar med en tanke.\n\nSå låt mig fråga dig:\n\nVad har fått dig att söka dig hit just nu?`;
const SUGGESTIONS = ['Jag känner att jag lever på autopilot.', 'Jag skjuter alltid upp saker.', 'Jag fastnar i samma gamla loopar.', 'Jag vet inte var jag ska börja.'];

let msgs = [];
let busy = false;

document.addEventListener('DOMContentLoaded', () => {
  msgs = [{ role: 'assistant', content: GREETING }];
  render();
});

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(t) {
  return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function render() {
  const c = document.getElementById('msgs');
  let h = '';
  msgs.forEach((m, i) => {
    if (m.role === 'assistant') {
      h += `<div class="msg assistant"><div class="msg-av-sm">SI</div><div class="bubble">${fmt(m.content)}</div></div>`;
      if (i === 0 && msgs.length === 1) {
        h += `<div class="suggestions">${SUGGESTIONS.map(s => `<button class="sug-btn" onclick="sendText('${s.replace(/'/g, "\\'")}')">${esc(s)}</button>`).join('')}</div>`;
      }
    } else {
      h += `<div class="msg user"><div class="bubble">${fmt(m.content)}</div></div>`;
    }
  });
  if (busy) {
    h += `<div class="msg assistant"><div class="msg-av-sm">SI</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  }
  c.innerHTML = h;
  c.scrollTop = c.scrollHeight;
}

async function sendText(text) {
  if (busy || !text.trim()) return;
  msgs.push({ role: 'user', content: text.trim() });
  busy = true;
  render();
  try {
    const apiMessages = msgs.filter((m, i) => !(i === 0 && m.role === 'assistant'));
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: apiMessages })
    });
    const d = await r.json();
    if (d.error) {
      msgs.push({ role: 'assistant', content: `API Error: ${d.error}` });
    } else {
      const reply = d.content || 'Jag är här. Vad dyker upp i dig just nu?';
      msgs.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    msgs.push({ role: 'assistant', content: `Error: ${e.message}` });
  }
  busy = false;
  render();
}

function send() {
  const inp = document.getElementById('inp');
  const t = inp.value;
  inp.value = '';
  resize(inp);
  toggleSend();
  sendText(t);
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!busy && document.getElementById('inp').value.trim()) send();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 128) + 'px';
}

function toggleSend() {
  document.getElementById('send-btn').disabled = !document.getElementById('inp').value.trim() || busy;
}
</script>
</body>
</html>
